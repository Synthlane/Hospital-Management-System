# This is the docker-compose file to run Medplum's required background services
# It can be used to quickly run 2 services:
# 1) The Postgres database
# 2) The Redis cache
# You can start all services by running "docker-compose up"

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=abcdEF@12
      - POSTGRES_DB=synthhms
    volumes:
      - ./postgres/postgres.conf:/usr/local/etc/postgres/postgres.conf
      - ./postgres/:/docker-entrypoint-initdb.d/
      - synth_hms_postgres_data:/var/lib/postgresql/data
    command: postgres -c config_file=/usr/local/etc/postgres/postgres.conf
    ports:
      - '5433:5432'

  redis:
    image: redis:7
    restart: always
    command: redis-server --requirepass medplum --save 60 1 --appendonly yes
    volumes:
      - synth_hms_redis_data:/data
    ports:
      - '6380:6379'

  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080'

volumes:
  synth_hms_postgres_data:
    external: true
  synth_hms_redis_data:
    external: true


